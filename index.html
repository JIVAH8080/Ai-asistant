<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Dental NYC — AI Receptionist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0a3547;--navy2:#0d4a61;--navy3:#0f5c78;
  --gold:#c8a84b;--cream:#f7f4ef;--white:#fff;
  --text:#1a1a1a;--ease:cubic-bezier(.25,.46,.45,.94);
}

html,body{
  height:100%;
  background:#ddd8d0;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
}

/* ── Shell ── */
.shell{
  width:100%;max-width:460px;
  height:100vh;max-height:820px;
  display:flex;flex-direction:column;
  background:var(--cream);
  border-radius:24px;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.22),0 4px 16px rgba(0,0,0,.1),
             inset 0 1px 0 rgba(255,255,255,.5);
}

/* ── Header ── */
.hdr{
  background:linear-gradient(150deg,#071f2b 0%,#0a3547 50%,#0c4258 100%);
  padding:16px 18px 14px;display:flex;align-items:center;gap:12px;
  position:relative;overflow:hidden;flex-shrink:0;
}
.hdr::before{content:'';position:absolute;top:-30px;right:-20px;width:120px;height:120px;
  border-radius:50%;background:radial-gradient(circle,rgba(200,168,75,.2) 0%,transparent 70%);}
.hdr-logo{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.07);border:1px solid rgba(200,168,75,.3);
  display:flex;align-items:center;justify-content:center;position:relative;z-index:1;
}
.hdr-info{flex:1;position:relative;z-index:1;}
.hdr-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:#fff;line-height:1.1;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-weight:300;}
.hdr-status{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.5);font-weight:300;position:relative;z-index:1;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.7);animation:pdot 2.5s ease-in-out infinite;}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ── Info strip ── */
.strip{background:var(--navy);padding:7px 18px;display:flex;gap:16px;flex-shrink:0;}
.sitem{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.38);font-weight:300;}
.sitem span{color:rgba(200,168,75,.7);font-size:12px;}

/* ── Messages ── */
.msgs{
  flex:1;overflow-y:auto;padding:16px 14px 8px;
  display:flex;flex-direction:column;gap:9px;
}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:#cdc6ba;border-radius:2px;}

.row{display:flex;gap:8px;animation:sup .24s var(--ease) both;}
.row.u{flex-direction:row-reverse;}
@keyframes sup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;
  background:linear-gradient(135deg,var(--navy),var(--navy3));
  border:1.5px solid rgba(200,168,75,.22);
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.bbl{max-width:80%;padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.58;word-wrap:break-word;}
.bbl.ai{background:var(--white);color:var(--text);border-bottom-left-radius:3px;
  box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);}
.bbl.u{background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;border-bottom-right-radius:3px;
  box-shadow:0 2px 8px rgba(10,53,71,.3);}

.cur{display:inline-block;width:2px;height:13px;background:var(--navy);margin-left:1px;vertical-align:middle;animation:bl .75s step-end infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

/* ── Thinking ── */
.thk-row{display:flex;gap:8px;animation:sup .24s ease both;}
.thk-bbl{
  max-width:82%;padding:8px 12px;background:linear-gradient(135deg,#fefce8,#fef3c7);
  border:1px solid #fcd34d;border-radius:14px;border-bottom-left-radius:3px;
  font-size:11px;color:#78350f;line-height:1.5;font-style:italic;font-weight:300;
  position:relative;overflow:hidden;
}
.thk-lbl{font-size:9.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:#92400e;margin-bottom:3px;font-style:normal;display:flex;align-items:center;gap:3px;}
.thk-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
  background-size:200% 100%;animation:shim 1.8s ease-in-out infinite;pointer-events:none;}
@keyframes shim{0%{background-position:-200% 0}100%{background-position:200% 0}}
#thk-txt{position:relative;z-index:1;max-height:48px;overflow:hidden;}

/* ── Typing dots ── */
.dot-row{display:flex;gap:8px;align-items:flex-end;animation:sup .24s ease both;}
.dot-bbl{background:var(--white);border-radius:16px;border-bottom-left-radius:3px;
  padding:11px 14px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;gap:4px;align-items:center;}
.d{width:6px;height:6px;border-radius:50%;background:var(--navy2);opacity:.3;animation:bnc 1.3s ease-in-out infinite;}
.d:nth-child(2){animation-delay:.16s}.d:nth-child(3){animation-delay:.32s}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

/* ── Tool banner ── */
.tool-row{
  margin-left:36px;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);
  border:1px solid #bae6fd;border-radius:11px;padding:8px 12px;
  display:flex;align-items:center;gap:8px;font-size:12px;color:#075985;
  font-weight:500;animation:sup .24s ease both;
}
.tool-spin{width:13px;height:13px;border:2px solid rgba(7,89,133,.15);
  border-top-color:#0369a1;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Booking card ── */
.card{
  margin-left:36px;background:linear-gradient(135deg,#f0fdf4,#ecfdf5);
  border:1px solid #86efac;border-radius:16px;padding:14px 16px;
  animation:sup .35s cubic-bezier(.34,1.56,.64,1) both;
  box-shadow:0 2px 12px rgba(22,163,74,.1);
}
.card-hd{display:flex;align-items:center;gap:7px;font-weight:600;color:#14532d;
  font-size:13px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid rgba(22,163,74,.15);}
.card-chk{width:20px;height:20px;border-radius:50%;background:#22c55e;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;}
.card-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;gap:8px;}
.cl{color:#6b7280;font-weight:400;flex-shrink:0}.cv{color:#111827;font-weight:500;text-align:right;}
.card-id{margin-top:10px;background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);
  border-radius:7px;padding:6px 9px;display:flex;justify-content:space-between;align-items:center;}
.card-id-l{font-size:11px;color:#6b7280}.card-id-v{font-size:12.5px;color:#15803d;font-weight:700;letter-spacing:1px;}

/* ── Chips ── */
.chips{padding:0 14px 9px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}
.chip{
  padding:5px 11px;border-radius:20px;border:1px solid #c4bcb1;
  background:var(--white);color:#374151;font-size:11.5px;
  font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:400;
  transition:all .14s ease;
}
.chip:hover{border-color:var(--navy);color:var(--navy);background:#edf4f8;transform:translateY(-1px);}
.chip:active{transform:scale(.97);}

/* ── Input ── */
.inp-area{padding:9px 14px 13px;background:var(--cream);border-top:1px solid #ddd7ce;flex-shrink:0;}
.inp-box{
  display:flex;gap:8px;align-items:flex-end;background:var(--white);
  border:1.5px solid #ccc5b9;border-radius:15px;padding:7px 7px 7px 13px;
  transition:border-color .16s,box-shadow .16s;
}
.inp-box:focus-within{border-color:var(--navy2);box-shadow:0 0 0 3px rgba(13,74,97,.07);}
textarea{
  flex:1;border:none;outline:none;resize:none;
  font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);
  background:transparent;line-height:1.5;max-height:90px;min-height:20px;padding:1px 0;
}
textarea::placeholder{color:#aaa49e;}
.snd{
  width:34px;height:34px;border-radius:11px;border:none;
  background:var(--navy);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .14s,transform .14s,opacity .14s;
}
.snd:hover:not(:disabled){background:var(--navy3);transform:scale(1.06);}
.snd:active:not(:disabled){transform:scale(.94);}
.snd:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.foot{text-align:center;font-size:9.5px;color:#b2aa9f;margin-top:6px;letter-spacing:.3px;}

#anc{height:1px;flex-shrink:0;}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-logo">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
        <path d="M12 2.5C9.8 2.5 8 4.3 8 6.5C8 8 8.8 9.3 10 10.1C9.1 11.7 8.5 13.8 8.5 16C8.5 19.3 9.9 22 12 22C14.1 22 15.5 19.3 15.5 16C15.5 13.8 14.9 11.7 14 10.1C15.2 9.3 16 8 16 6.5C16 4.3 14.2 2.5 12 2.5Z"
          stroke="rgba(255,255,255,.82)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.5 10.8C10.3 11.2 11.1 11.4 12 11.4C12.9 11.4 13.7 11.2 14.5 10.8"
          stroke="#c8a84b" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="hdr-info">
      <div class="hdr-name">Sky Dental NYC</div>
      <div class="hdr-sub">Virtual Receptionist</div>
    </div>
    <div class="hdr-status"><div class="hdr-dot"></div>Online</div>
  </div>

  <div class="strip">
    <div class="sitem"><span>📍</span>Midtown Manhattan</div>
    <div class="sitem"><span>🕐</span>Mon–Sat 8AM–7PM</div>
    <div class="sitem"><span>🚨</span>Same-day emergency</div>
  </div>

  <div class="msgs" id="msgs"><div id="anc"></div></div>

  <div class="chips" id="chips">
    <button class="chip" onclick="chip(this)">📅 Book appointment</button>
    <button class="chip" onclick="chip(this)">🦷 Services offered</button>
    <button class="chip" onclick="chip(this)">💳 Insurance</button>
    <button class="chip" onclick="chip(this)">🚨 Dental emergency</button>
    <button class="chip" onclick="chip(this)">⏰ Hours & location</button>
  </div>

  <div class="inp-area">
    <div class="inp-box">
      <textarea id="inp" rows="1" placeholder="Type your message…"
        onkeydown="onKey(event)" oninput="onTyping(this)"></textarea>
      <button class="snd" id="snd" onclick="send()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="foot">Gemma 2 2B · Claude Sonnet fallback &nbsp;·&nbsp; Sky Dental NYC &nbsp;·&nbsp; (212) 555-0100</div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════════
   PROXY URL — requests go to local Node.js server
   which forwards to NVIDIA (bypasses browser CORS)
════════════════════════════════════════════════════ */
const PROXY = 'http://localhost:3001/proxy';

const SYSTEM = `You are a friendly and professional AI receptionist for Sky Dental NYC.

Responsibilities: answer questions about services, help book appointments, collect patient details.

Tone: polite, calm, reassuring. ONE question per message only. Keep replies to 2–3 sentences max.

Services: General dentistry · Cosmetic dentistry · Dental implants · Invisalign · Teeth whitening · Veneers · Crowns · Bridges · Root canal · Emergency dental care

FAQs:
- Insurance: We accept most major dental insurance plans
- Location: Midtown Manhattan, New York City
- Hours: Monday–Saturday 8AM–7PM
- Emergencies: Same-day or earliest available
- Phone: (212) 555-0100

Booking Flow (strictly one step per message):
1. Ask service needed
2. Ask preferred date
3. Ask preferred time
4. Collect full name
5. Collect phone number
6. Collect email (optional)
7. Call check_availability — verify the slot
8. Read back all details, ask patient to confirm YES or NO
9. Only after YES — call book_appointment

Rules:
- NEVER book without check_availability first
- NEVER book without explicit YES confirmation
- Suggest alternatives if slot unavailable`;

const TOOLS = [
  {type:'function',function:{name:'check_availability',description:'Check available appointment slots',
    parameters:{type:'object',properties:{
      date:{type:'string',description:'Date YYYY-MM-DD'},
      service:{type:'string',description:'Dental service'}},required:['date']}}},
  {type:'function',function:{name:'book_appointment',description:'Book confirmed dental appointment after patient YES',
    parameters:{type:'object',properties:{
      full_name:{type:'string'},phone:{type:'string'},email:{type:'string'},
      service:{type:'string'},date:{type:'string'},time:{type:'string'}},
      required:['full_name','phone','service','date','time']}}}
];

/* ── Tool simulation ── */
function execTool(name, args) {
  if (name === 'check_availability') {
    const slots = ['09:00','10:30','11:00','13:30','14:00','15:30','16:00','17:00'];
    return {available:true,date:args.date,service:args.service||'Any',slots,
            message:`Available on ${args.date}: ${slots.join(', ')}`};
  }
  if (name === 'book_appointment') {
    const id = 'SKY-' + Math.random().toString(36).substr(2,6).toUpperCase();
    return {success:true,confirmation_id:id,...args};
  }
  return {error:'Unknown tool'};
}

/* ── State ── */
let history = [];
let busy    = false;

/* ── DOM ── */
const msgsEl  = document.getElementById('msgs');
const ancEl   = document.getElementById('anc');
const inpEl   = document.getElementById('inp');
const sndBtn  = document.getElementById('snd');
const chipsEl = document.getElementById('chips');

const sc  = () => setTimeout(() => ancEl.scrollIntoView({behavior:'smooth'}), 20);
const esc = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
const ins = el => { msgsEl.insertBefore(el, ancEl); sc(); };
const $   = id => document.getElementById(id);

/* ── UI helpers ── */
function userRow(text) {
  const r = document.createElement('div'); r.className = 'row u';
  r.innerHTML = `<div class="bbl u">${esc(text)}</div>`; ins(r);
}

function aiStreamRow() {
  const bbl = document.createElement('div'); bbl.className = 'bbl ai';
  bbl.innerHTML = '<span class="cur"></span>';
  const av = document.createElement('div'); av.className = 'av'; av.textContent = '🦷';
  const r  = document.createElement('div'); r.className = 'row';
  r.appendChild(av); r.appendChild(bbl); ins(r);
  return bbl;
}

function typingRow() {
  if ($('_typ')) return;
  const r = document.createElement('div'); r.className = 'dot-row'; r.id = '_typ';
  r.innerHTML = `<div class="av">🦷</div><div class="dot-bbl"><div class="d"></div><div class="d"></div><div class="d"></div></div>`;
  ins(r);
}
function rmTyping() { $('_typ')?.remove(); }

function setThinking(text) {
  if (!$('_thk')) {
    const r = document.createElement('div'); r.className = 'thk-row'; r.id = '_thk';
    const av = document.createElement('div'); av.className = 'av'; av.textContent = '🦷';
    const bbl = document.createElement('div'); bbl.className = 'thk-bbl';
    bbl.innerHTML = `<div class="thk-shimmer"></div><div class="thk-lbl">⚡ Thinking</div><div id="thk-txt"></div>`;
    r.appendChild(av); r.appendChild(bbl); ins(r);
  }
  $('thk-txt').textContent = text.length > 200 ? '…' + text.slice(-200) : text;
  sc();
}
function rmThinking() { $('_thk')?.remove(); }

function toolRow(label) {
  $('_tool')?.remove();
  const r = document.createElement('div'); r.className = 'tool-row'; r.id = '_tool';
  r.innerHTML = `<div class="tool-spin"></div>${esc(label)}`; ins(r);
}
function rmTool() { $('_tool')?.remove(); }

function bookCard(data) {
  const pairs = [
    ['Patient',data.full_name],['Service',data.service],
    ['Date',data.date],['Time',data.time],['Phone',data.phone],
    ...(data.email?[['Email',data.email]]:[])
  ];
  const rows = pairs.map(([l,v])=>`<div class="card-row"><span class="cl">${l}</span><span class="cv">${esc(String(v))}</span></div>`).join('');
  const c = document.createElement('div'); c.className = 'card';
  c.innerHTML = `
    <div class="card-hd">
      <div class="card-chk"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      Appointment Confirmed
    </div>${rows}
    <div class="card-id"><span class="card-id-l">Confirmation ID</span><span class="card-id-v">${esc(data.confirmation_id)}</span></div>`;
  ins(c);
}

function setDisabled(v) {
  busy = v; inpEl.disabled = v;
  sndBtn.disabled = v || !inpEl.value.trim();
}

const wait = ms => new Promise(r => setTimeout(r, ms));

/* ════════════════════════════════════════════════════
   AGENT LOOP — SSE via local proxy
════════════════════════════════════════════════════ */
async function runAgent(userText) {
  history.push({role:'user', content:userText});
  setDisabled(true);

  try {
    while (true) {

      let res;
      try {
        res = await fetch(PROXY, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            model:       'google/gemma-2-2b-it',
            messages:    [{role:'system', content:SYSTEM}, ...history],
            tools:       TOOLS,
            tool_choice: 'auto',
            temperature: 0.2,
            top_p:       0.7,
            max_tokens:  1024,
            stream:      true
          })
        });
      } catch(e) {
        throw new Error('Cannot reach proxy server.\n\nMake sure server.js is running:\n  node server.js\n\nThen open http://localhost:3001');
      }

      if (!res.ok) {
        const t = await res.text();
        throw new Error(`API error ${res.status}: ${t}`);
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      let fullText  = '';
      let fullReason= '';
      const toolMap = {};
      let hasTools  = false;
      let streamBbl = null;

      typingRow();

      read_loop:
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream:true});

        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break read_loop;

          let chunk;
          try { chunk = JSON.parse(raw); } catch { continue; }

          const delta = chunk.choices?.[0]?.delta;
          if (!delta) continue;

          if (delta.reasoning_content) {
            fullReason += delta.reasoning_content;
            rmTyping(); setThinking(fullReason);
          }

          if (delta.content) {
            fullText += delta.content;
            if (!streamBbl) { rmTyping(); rmThinking(); streamBbl = aiStreamRow(); }
            streamBbl.innerHTML = esc(fullText) + '<span class="cur"></span>';
            sc();
          }

          if (delta.tool_calls) {
            hasTools = true;
            for (const tc of delta.tool_calls) {
              const i = tc.index ?? 0;
              if (!toolMap[i]) toolMap[i] = {id:'',name:'',args:''};
              if (tc.id)                  toolMap[i].id   = tc.id;
              if (tc.function?.name)      toolMap[i].name += tc.function.name;
              if (tc.function?.arguments) toolMap[i].args += tc.function.arguments;
            }
          }
        }
      }

      rmTyping(); rmThinking();
      if (streamBbl) streamBbl.innerHTML = esc(fullText);

      if (hasTools && Object.keys(toolMap).length) {
        const calls = Object.values(toolMap);
        history.push({
          role:'assistant', content:fullText||null,
          tool_calls: calls.map(tc=>({id:tc.id,type:'function',function:{name:tc.name,arguments:tc.args}}))
        });

        for (const tc of calls) {
          let args = {};
          try { args = JSON.parse(tc.args); } catch {}

          const label = tc.name === 'check_availability'
            ? `Checking availability for ${args.date ?? 'requested date'}…`
            : `Booking appointment for ${args.full_name ?? 'patient'}…`;

          toolRow(label);
          await wait(900);
          rmTool();

          const result = execTool(tc.name, args);
          if (tc.name === 'book_appointment' && result.success) bookCard(result);

          history.push({role:'tool',tool_call_id:tc.id,name:tc.name,content:JSON.stringify(result)});
        }
        continue;
      }

      if (fullText.trim()) history.push({role:'assistant',content:fullText.trim()});
      break;
    }

  } catch(err) {
    rmTyping(); rmTool(); rmThinking();
    const r = document.createElement('div'); r.className = 'row';
    r.innerHTML = `<div class="av">🦷</div><div class="bbl ai" style="color:#b91c1c;background:#fef2f2;border:1px solid #fca5a5;white-space:pre-wrap;font-size:12px">${esc(err.message)}</div>`;
    ins(r);
    console.error('[SkyDental]', err);
  } finally {
    setDisabled(false);
  }
}

/* ── Input ── */
function onKey(e)   { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function onTyping(t){ t.style.height='auto'; t.style.height=t.scrollHeight+'px'; sndBtn.disabled=!t.value.trim()||busy; }

function send() {
  const txt = inpEl.value.trim(); if (!txt || busy) return;
  inpEl.value=''; inpEl.style.height='auto'; sndBtn.disabled=true;
  chipsEl.style.display='none';
  userRow(txt); runAgent(txt);
}

function chip(el) {
  if (busy) return;
  chipsEl.style.display='none';
  userRow(el.textContent);
  runAgent(el.textContent.replace(/^[^\s]+\s/,''));
}

/* ── Greeting ── */
async function greet() {
  const msg = "Thank you for contacting Sky Dental NYC! I'm your virtual assistant — I can help you book an appointment, answer questions about our services, or assist with a dental emergency. How can I help you today?";
  const bbl = aiStreamRow(); let out = '';
  for (const ch of msg) {
    out += ch; bbl.innerHTML = esc(out) + '<span class="cur"></span>'; sc();
    await wait(ch==='.'||ch===','?30:10);
  }
  bbl.innerHTML = esc(out);
  history.push({role:'assistant',content:msg});
}

greet();
</script>
